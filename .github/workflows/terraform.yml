# This workflow installs the latest version of Terraform CLI and configures the Terraform CLI configuration file
# with an API token for Terraform Cloud (app.terraform.io). On pull request events, this workflow will run
# `terraform init`, `terraform fmt`, and `terraform plan` (speculative plan via Terraform Cloud). On push events
# to the "main" branch, `terraform apply` will be executed.
#
# Documentation for `hashicorp/setup-terraform` is located here: https://github.com/hashicorp/setup-terraform
#
# To use this workflow, you will need to complete the following setup steps.
#
# 1. Create a `main.tf` file in the root of this repository with the `remote` backend and one or more resources defined.
#   Example `main.tf`:
#     # The configuration for the `remote` backend.
#     terraform {
#       backend "remote" {
#         # The name of your Terraform Cloud organization.
#         organization = "example-organization"
#
#         # The name of the Terraform Cloud workspace to store Terraform state files in.
#         workspaces {
#           name = "example-workspace"
#         }
#       }
#     }
#
#     # An example resource that does nothing.
#     resource "null_resource" "example" {
#       triggers = {
#         value = "A example resource that does nothing!"
#       }
#     }
#
#
# 2. Generate a Terraform Cloud user API token and store it as a GitHub secret (e.g. TF_API_TOKEN) on this repository.
#   Documentation:
#     - https://www.terraform.io/docs/cloud/users-teams-organizations/api-tokens.html
#     - https://help.github.com/en/actions/configuring-and-managing-workflows/creating-and-storing-encrypted-secrets
#
# 3. Reference the GitHub secret in step using the `hashicorp/setup-terraform` GitHub Action.
#   Example:
#     - name: Setup Terraform
#       uses: hashicorp/setup-terraform@v1
#       with:
#         cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}



name: Terraform Azure - Init, Plan & Apply

on:
  push:
    branches:
      - main          # Auto apply when pushed to main
  pull_request:
    branches:
      - main          # Only plan when PR is raised (no apply)
  workflow_dispatch:  # Allows you to run manually from GitHub UI

env:
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}

jobs:
  terraform:
    name: Terraform Init, Plan & Apply
    runs-on: ubuntu-latest

    steps:

      # ----------------------------------------
      # Step 1 - Checkout your code from GitHub
      # ----------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ----------------------------------------
      # Step 2 - Install Terraform on the runner
      # ----------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # ----------------------------------------
      # Step 3 - Terraform Init
      # Connects to Azure backend & downloads providers
      # ----------------------------------------
      - name: Terraform Init
        run: terraform init
        working-directory: ./         # Change this if your .tf files are in a subfolder
                                      # Example: working-directory: ./infra

      # ----------------------------------------
      # Step 4 - Terraform Format Check
      # Fails if code is not properly formatted
      # ----------------------------------------
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ./

      # ----------------------------------------
      # Step 5 - Terraform Validate
      # Checks if configuration is valid
      # ----------------------------------------
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./

      # ----------------------------------------
      # Step 6 - Terraform Plan
      # Runs on both PR and Push
      # Saves plan to a file for apply step
      # ----------------------------------------
      - name: Terraform Plan
        run: terraform plan -no-color -input=false -out=tfplan
        working-directory: ./

      # ----------------------------------------
      # Step 7 - Upload Plan File
      # Saves the plan so apply step can use it
      # ----------------------------------------
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

      # ----------------------------------------
      # Step 8 - Terraform Apply
      # ONLY runs when code is merged to main
      # Will NOT run on Pull Requests
      # ----------------------------------------
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false tfplan
        working-directory: ./

